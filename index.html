<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INSANE Shooter 🔥</title>
<style>
body{margin:0;overflow:hidden;background:black;color:white;font-family:Arial}
canvas{display:block}
#menu,#shopMenu{
 position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
 text-align:center;background:#000d;padding:25px;border-radius:15px;
}
button{padding:10px 20px;margin:10px;font-size:16px;border:none;border-radius:10px;cursor:pointer}
#stats{position:fixed;top:10px;left:50%;transform:translateX(-50%);font-size:18px}
#pauseBtn{position:fixed;top:10px;right:10px}
#shopBtn{position:fixed;top:10px;left:10px}
</style>
</head>
<body>

<div id="menu">
<h1>🔥 INSANE SHOOTER 🔥</h1>
<p>Move: Arrow Keys / Touch<br>Shoot: SPACE<br>Press SHOP to upgrade</p>
<button onclick="startGame()">START</button>
</div>

<div id="shopMenu" style="display:none;">
<h2>🛒 SHOP</h2>
<p id="shopCoins"></p>
<button onclick="buy('spread')">Spread Shot (5)</button><br>
<button onclick="buy('laser')">Laser (5)</button><br>
<button onclick="buy('health')">+1 Health (3)</button><br>
<button onclick="buy('speed')">Speed Boost (3)</button><br>
<button onclick="closeShop()">Close</button>
</div>

<div id="stats"></div>
<button id="pauseBtn" onclick="togglePause()" style="display:none;">Pause</button>
<button id="shopBtn" onclick="openShop()" style="display:none;">Shop</button>
<canvas id="game"></canvas>

<script>
const c=document.getElementById("game");
const x=c.getContext("2d");
const menu=document.getElementById("menu");
const shopMenu=document.getElementById("shopMenu");
const stats=document.getElementById("stats");
const pauseBtn=document.getElementById("pauseBtn");
const shopBtn=document.getElementById("shopBtn");

function resize(){c.width=innerWidth;c.height=innerHeight}
addEventListener("resize",resize);resize();

let player,bullets,enemies,particles,score,coins,level,health,weapon;
let running=false,paused=false,inShop=false;

function init(){
player={x:c.width/2,y:c.height-80,size:20,speed:6};
bullets=[];enemies=[];particles=[];
score=0;coins=load("coins")||0;level=1;health=3;
weapon=load("weapon")||"normal";
running=true;paused=false;
pauseBtn.style.display="block";
shopBtn.style.display="block";
}

function save(){localStorage.setItem("coins",coins);localStorage.setItem("weapon",weapon)}
function load(k){return JSON.parse(localStorage.getItem(k))}

function startGame(){menu.style.display="none";init();loop();}

function togglePause(){
paused=!paused;
pauseBtn.innerText=paused?"Resume":"Pause";
if(!paused) loop();
}

function openShop(){
inShop=true;paused=true;
shopMenu.style.display="block";
document.getElementById("shopCoins").innerText="Coins: "+coins;
}

function closeShop(){
inShop=false;paused=false;
shopMenu.style.display="none";
loop();
}

function buy(type){
if(type==="spread"&&coins>=5){coins-=5;weapon="spread"}
if(type==="laser"&&coins>=5){coins-=5;weapon="laser"}
if(type==="health"&&coins>=3){coins-=3;health++}
if(type==="speed"&&coins>=3){coins-=3;player.speed+=2}
}

function spawnEnemy(){
let e={x:Math.random()*c.width,y:-20,size:20,speed:2+level*0.4};
enemies.push(e);
}

function shoot(){
if(!running||paused||inShop) return;
if(weapon==="normal") bullets.push({x:player.x,y:player.y,vx:0});
if(weapon==="spread"){
bullets.push({x:player.x,y:player.y,vx:-3});
bullets.push({x:player.x,y:player.y,vx:0});
bullets.push({x:player.x,y:player.y,vx:3});
}
if(weapon==="laser") bullets.push({x:player.x,y:player.y,vx:0});
}

function particle(px,py){
particles.push({x:px,y:py,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:20});
}

function loop(){
if(!running||paused||inShop) return;
x.fillStyle="rgba(0,0,0,0.3)";
x.fillRect(0,0,c.width,c.height);

x.shadowBlur=20;x.shadowColor="lime";
x.fillStyle="lime";
x.beginPath();x.arc(player.x,player.y,player.size,0,Math.PI*2);x.fill();
x.shadowBlur=0;

x.fillStyle="yellow";
bullets.forEach((b,i)=>{
b.y-=8;b.x+=b.vx||0;
x.fillRect(b.x,b.y,4,10);
if(b.y<0) bullets.splice(i,1);
});

x.fillStyle="red";
enemies.forEach((e,ei)=>{
e.y+=e.speed;
x.fillRect(e.x,e.y,e.size,e.size);

if(Math.abs(e.x-player.x)<20 && Math.abs(e.y-player.y)<20){
health--;particle(e.x,e.y);enemies.splice(ei,1);
if(health<=0){running=false;save();showGameOver();}
}

bullets.forEach((b,bi)=>{
if(b.x<e.x+e.size&&b.x>e.x&&b.y<e.y+e.size&&b.y>e.y){
score++; if(score%5===0) coins++; if(score%10===0) level++;
particle(e.x,e.y);
enemies.splice(ei,1);bullets.splice(bi,1);
}
});
});

particles.forEach((p,pi)=>{
p.x+=p.vx;p.y+=p.vy;p.life--;
x.fillStyle="orange";
x.fillRect(p.x,p.y,3,3);
if(p.life<=0) particles.splice(pi,1);
});

stats.innerText=`Score:${score} Coins:${coins} Level:${level} ❤️${health} Weapon:${weapon}`;

requestAnimationFrame(loop);
}

function showGameOver(){
menu.style.display="block";
menu.innerHTML=`<h1>💀 GAME OVER</h1><p>Score:${score}</p><button onclick='startGame()'>Restart</button>`;
pauseBtn.style.display="none";
shopBtn.style.display="none";
}

let keys={};
addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key===" ") shoot();
if(e.key.toLowerCase()==="e") openShop();
});
addEventListener("keyup",e=>keys[e.key]=false);

c.addEventListener("touchmove",e=>{
player.x=e.touches[0].clientX;
player.y=e.touches[0].clientY;
});

function move(){
if(keys["ArrowLeft"]) player.x-=player.speed;
if(keys["ArrowRight"]) player.x+=player.speed;
requestAnimationFrame(move);
}

setInterval(spawnEnemy,700);

move();
</script>
</body>
</html>
